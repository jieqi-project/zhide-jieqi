<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>志德岁时纪·节气上上签</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="preload" href="./assets/stickers/sun.svg" as="image">
  <link rel="preload" href="./assets/backgrounds/bg1.svg" as="image">
</head>
<body>
  <div class="bg-gradient"></div>
  <div id="app">
    <div class="page">
      <header class="app-header">
        <button id="hamburger" class="hamburger-btn">☰</button>
        <div class="brand">志德岁时纪</div>
        <div class="subtitle">节气上上签</div>
      </header>
      <main class="view">
      <section id="view-draw" class="panel active">
        <div class="draw-container glass soft">
          <div class="lottery-area" id="lotteryArea">
            <div class="lottery-tube">
              <svg viewBox="0 0 200 240" class="tube-svg">
                <ellipse cx="100" cy="50" rx="80" ry="30" fill="#6b4f2a"></ellipse>
                <rect x="20" y="50" width="160" height="140" rx="20" fill="#5a3f1f"></rect>
                <ellipse cx="100" cy="190" rx="80" ry="30" fill="#5a3f1f"></ellipse>
              </svg>
              <div class="sticks"></div>
            </div>
            <div class="fortune-card" id="fortuneCard">
              <div class="fortune-title" id="fortuneTitle"></div>
              <div class="fortune-grade" id="fortuneGrade"></div>
              <div class="fortune-text" id="fortuneText"></div>
            </div>
          </div>
          <div class="tap-hint" id="tapHint">轻触屏幕抽取节气签<br/>摇一摇抽签桶<br/>可截图保存结果</div>
          <div class="draw-actions" id="drawActions">
            <button id="btnRetry" class="btn">再来一次</button>
            <button id="btnAccept" class="btn primary">开心收下</button>
          </div>
        </div>
      </section>
      <section id="view-collage" class="panel">
          <div class="collage-layout">
          <div class="preview-wrap glass soft">
            <canvas id="collageCanvas" width="750" height="1000"></canvas>
            <div id="stickerLayer" class="sticker-layer"></div>
            <div class="limit-tip" id="limitTip"></div>
            <div class="mode-tip" id="modeTip"></div>
          </div>
          <div class="side-menu soft">
            <button class="menu-btn" id="btnBg">底图</button>
            <button class="menu-btn" id="btnStickerNature">风物贴纸</button>
            <button class="menu-btn" id="btnStickerXiaSun">小笋贴纸</button>
            <button class="menu-btn" id="btnStickerLayout">排版素材</button>
            <button class="menu-btn" id="btnClear">清空画布</button>
            <button class="menu-btn" id="btnToggleMode">编辑模式</button>
            <button class="menu-btn" id="btnSave">保存图片</button>
          </div>
        </div>
        <div class="picker-card hidden" id="stickerModal">
          <div class="modal-header">
            <div class="modal-title" id="modalTitle"></div>
            <button class="icon-btn" id="modalClose">×</button>
          </div>
          <div class="sticker-grid" id="stickerGrid"></div>
        </div>
        <div class="picker-card hidden" id="bgModal">
          <div class="modal-header">
            <div class="modal-title">选择底图</div>
            <button class="icon-btn" id="bgClose">×</button>
          </div>
          <div class="bg-grid" id="bgGrid"></div>
        </div>
      </section>
      <section id="view-info" class="panel">
        <div class="info-page glass">
          <div class="info-text">
            「志德岁时纪·节气上上签」是志德书院文化承创中心与传媒新闻中心合作推出的线上网页服务，在2026年3-6月，每月更新发布节气照片底图，可抽节气签、制作有书院与时令特色的拼贴画。传播传统文化、展现书院风貌、鼓励美育创作。
            <br><br>
            产品与前端：潘芷晴<br>
            部署与维护：魏紫陌<br>
            界面设计：张姝妍<br>
            摄影底图：干事<br>
            贴纸素材：干事<br>
            UI素材：干事<br>
            宣传：干事
            <br><br>
            详情可见：（微信链接）
            <br>
            活动预告：5月另有拼贴画制作抽奖活动，欢迎大家保存自己每个月的拼贴画进行投稿～
          </div>
        </div>
      </section>
      </main>
      <div class="watermark">@志德文创</div>
    </div>
    <aside id="drawer" class="drawer">
      <div id="drawerMask" class="drawer-mask"></div>
      <div class="drawer-panel glass">
        <button class="drawer-link" id="navDraw">节气抽签</button>
        <button class="drawer-link" id="navCollage">拼贴画廊</button>
        <button class="drawer-link" id="navInfo">相关信息</button>
      </div>
    </aside>
  </div>
  <script src="./app.js"></script>
</body>
</html>
